name: Déploiement GitHub Pages

# Publie le module d'apprentissage (site statique à la racine) sur GitHub Pages.
# Le premier run active Pages automatiquement (configure-pages: enablement).

on:
  push:
    branches:
      - claude/learning-materials-mobile-0y47cv
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un seul déploiement à la fois.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Configurer Pages (active Pages si besoin)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Préparer l'artefact du site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Déployer sur Pages
        id: deployment
        uses: actions/deploy-pages@v4
